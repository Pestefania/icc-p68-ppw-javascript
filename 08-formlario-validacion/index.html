<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="page">

  <!-- FORMULARIO -->
  <section class="container">
    <h1>Formulario de Registro</h1>

    <form id="form-registro" class="form-registro" novalidate>

      <div class="form-group">
        <label for="nombre">Nombre completo *</label>
        <input id="nombre" type="text" name="nombre" required>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input id="email" type="email" name="email" required>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono *</label>
        <input id="telefono" type="tel" name="telefono" required>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="fecha_nacimiento">Fecha de nacimiento *</label>
        <input id="fecha_nacimiento" type="date" name="fecha_nacimiento" required>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="genero">Género *</label>
        <select id="genero" name="genero" required>
          <option value="">Seleccionar...</option>
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
          <option value="otro">Otro</option>
        </select>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña *</label>
        <input id="password" type="password" name="password" required>
        <div id="password-strength" class="password-strength"></div>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group">
        <label for="confirmar_password">Confirmar contraseña *</label>
        <input id="confirmar_password" type="password" name="confirmar_password" required>
        <div class="error-mensaje"></div>
      </div>

      <div class="form-group checkbox">
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">Acepto los términos *</label>
      </div>
      <div class="error-mensaje"></div>

      <button type="submit" id="btn-enviar" class="btn-submit" disabled>
        Registrarse
      </button>
      <button type="button" id="btn-limpiar" class="btn-secondary">
        Limpiar
      </button>

    </form>
  </section>

  <!-- MENSAJES -->
  <section class="container">
    <div id="mensaje-estado" class="mensaje-estado oculto"></div>
  </section>

  <!-- RESULTADO -->
  <section class="container">
    <h2>Datos enviados</h2>
    <div id="resultado-registro" class="resultado-vacio">
      <p>No hay datos aún</p>
    </div>
  </section>

</main>

<script src="js/validacion.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>

</body>
</html>
